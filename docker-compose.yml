services:
  postgres:
    image: postgres:16-alpine
    container_name: zahnfunnel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zahnfunnel}
      POSTGRES_USER: ${POSTGRES_USER:-zahnfunnel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zahnfunnel_dev_pw_change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zahnfunnel} -d ${POSTGRES_DB:-zahnfunnel}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: zahnfunnel_postgres_data
